<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>카테고리 목록</title>
</head>
<body>

<h1>카테고리 목록</h1>
<p th:if="${successMessage}" th:text="${successMessage}"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}"></p>
<a th:href="@{/categories/create}">+ 카테고리 등록</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>이름</th>
        <th>작업</th>
    </tr>
    </thead>
    <tbody>
        <tr th:each="cat : ${categories}">
            <td th:text="${cat.id}">1</td>
            <td th:text="${cat.name}">카테고리</td>
            <td>
                <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post">
                    <button type="submit">삭제</button>
                </form>
            </td>
        </tr>
    </tbody>
</table>

<footer style="margin-top:24px; font-size:14px; color:#555;">
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2171140 | 성명: 박세웅'}">
    </p>
</footer>

</body>
</html>
